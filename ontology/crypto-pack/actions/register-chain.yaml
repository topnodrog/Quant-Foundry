# actions/register-chain.yaml
action: RegisterChain
version: 1
reversible: false

preconditions:
  - expr: "actor.hasRole('ingestor') || actor.hasRole('analyst') || actor.hasRole('admin')"
    error: "Only ingestors, analysts, or admins can register chains"

effects:
  - type: createObject
    objectType: "Chain"
    properties:
      key: "params.key"
      name: "params.name"
      chainId: "params.chainId"
      nativeSymbol: "params.nativeSymbol"

# actions/register-exchange.yaml
action: RegisterExchange
version: 1
reversible: false

preconditions:
  - expr: "actor.hasRole('ingestor') || actor.hasRole('analyst') || actor.hasRole('admin')"
    error: "Only ingestors, analysts, or admins can register exchanges"

effects:
  - type: createObject
    objectType: "Exchange"
    properties:
      exchangeKey: "params.exchangeKey"
      name: "params.name"
      kind: "params.kind"
